<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist | Media</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background: #111827;
        color: white;
        min-height: 100vh;
      }

      header {
        padding: 24px 48px;
        background: #1f2937;
        border-bottom: 1px solid #374151;
      }

      header h1 {
        font-size: 28px;
      }

      header p {
        margin-top: 6px;
        color: #9ca3af;
      }

      main {
        padding: 40px 48px;
      }

      .media-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 28px;
      }

      .media-card {
        background: #1f2937;
        border-radius: 14px;
        overflow: hidden;
        text-decoration: none;
        color: white;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .media-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      .media-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        display: block;
        background: #374151;
      }

      .media-info {
        padding: 14px;
      }

      .media-info h2 {
        font-size: 16px;
        margin-bottom: 6px;
      }

      .media-info p {
        font-size: 14px;
        color: #9ca3af;
      }

      .message {
        color: #9ca3af;
        font-size: 18px;
      }

      .error {
        color: #fecaca;
        background: #7f1d1d;
        padding: 14px;
        border-radius: 10px;
      }
      header {
  padding: 24px 48px;
  background: #1f2937;
  border-bottom: 1px solid #374151;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.logout-button {
  border: none;
  border-radius: 10px;
  padding: 10px 16px;
  background: #ef4444;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.logout-button:hover {
  background: #dc2626;
}
    </style>
  </head>

  <body>
    <header>
      <h1>Watchlist</h1>
      <p>Browse media and add your favorites to your watchlist</p>
      <button id="logoutButton" class="logout-button" type="button">
        Logout
      </button>
    </header>

    <main>
      <section id="mediaGrid" class="media-grid">
        <p class="message">Loading media...</p>
      </section>
    </main>

    <script>
      const mediaGrid = document.getElementById("mediaGrid");

      async function loadMedia() {
        try {
          const token = localStorage.getItem("token");

          const response = await fetch("https://watch-list-backend-xi.vercel.app/api/media/all", {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });
          const result = await response.json();

          if (!response.ok) {
            mediaGrid.innerHTML = `
              <p class="error">${result.message || "Failed to load media."}</p>
            `;
            return;
          }

          const mediaList = result.data;

          if (!mediaList || mediaList.length === 0) {
            mediaGrid.innerHTML = `<p class="message">No media found.</p>`;
            return;
          }

          mediaGrid.innerHTML = "";

          mediaList.forEach((media) => {
            const card = document.createElement("a");

            card.href = `media.html?id=${media._id}`;
            card.className = "media-card";

            card.innerHTML = `
              <img
                src="${media.poster}"
                alt="${media.title} poster"
                onerror="this.src='https://placehold.co/300x450?text=No+Poster'"
              />

              <div class="media-info">
                <h2>${media.title}</h2>
                <p>${media.type} • ${media.releaseYear}</p>
              </div>
            `;

            mediaGrid.appendChild(card);
          });
        } catch (error) {
          mediaGrid.innerHTML = `
            <p class="error">
              Could not connect to the backend. Make sure your server is running on https://watch-list-backend-xi.vercel.app.
            </p>
          `;
        }
      }
      const logoutButton = document.getElementById("logoutButton");

      logoutButton.addEventListener("click", () => {
        localStorage.removeItem("token");
        localStorage.removeItem("user");

        window.location.href = "login.html";
      });
      loadMedia();
    </script>
  </body>
</html>
