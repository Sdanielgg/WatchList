<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Details | Watchlist</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background: #111827;
        color: white;
        min-height: 100vh;
      }

      header {
        padding: 24px 48px;
        background: #1f2937;
        border-bottom: 1px solid #374151;
      }

      header a {
        color: #818cf8;
        text-decoration: none;
        font-weight: bold;
      }

      main {
        padding: 48px;
      }

      .media-details {
        max-width: 1000px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 40px;
        background: #1f2937;
        padding: 32px;
        border-radius: 18px;
      }

      .poster {
        width: 100%;
        min-height: 430px;
        border-radius: 14px;
        object-fit: cover;
        background: #374151;
      }

      .info h1 {
        font-size: 36px;
        margin-bottom: 12px;
      }

      .meta {
        color: #9ca3af;
        margin-bottom: 20px;
      }

      .genres {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 24px;
      }

      .genre {
        background: #374151;
        color: #d1d5db;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 14px;
      }

      .summary {
        line-height: 1.7;
        color: #d1d5db;
        margin-bottom: 28px;
      }

      .rating {
        margin-bottom: 24px;
        font-size: 18px;
      }

      .add-button {
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        background: #6366f1;
        color: white;
      }

      .add-button:hover {
        background: #4f46e5;
      }

      .disabled-note {
        margin-top: 14px;
        color: #9ca3af;
        font-size: 14px;
      }

      .message {
        max-width: 800px;
        margin: 0 auto;
        color: #9ca3af;
        font-size: 18px;
      }

      .error {
        max-width: 800px;
        margin: 0 auto;
        color: #fecaca;
        background: #7f1d1d;
        padding: 14px;
        border-radius: 10px;
      }

      @media (max-width: 800px) {
        main {
          padding: 24px;
        }

        header {
          padding: 20px 24px;
        }

        .media-details {
          grid-template-columns: 1fr;
        }

        .poster {
          max-width: 320px;
          min-height: auto;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <a href="index.html">← Back to media</a>
    </header>

    <main id="mainContent">
      <p class="message">Loading media...</p>
    </main>

    <script>
      const mainContent = document.getElementById("mainContent");

      function getMediaIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
      }

      function renderGenres(genres) {
        if (!genres || !Array.isArray(genres) || genres.length === 0) {
          return `<span class="genre">No genres</span>`;
        }

        return genres
          .map((genre) => `<span class="genre">${genre}</span>`)
          .join("");
      }

      async function loadMediaDetails() {
        const mediaId = getMediaIdFromUrl();

        if (!mediaId) {
          mainContent.innerHTML = `
            <p class="error">No media ID was provided in the URL.</p>
          `;
          return;
        }

        const token = localStorage.getItem("token");

        if (!token) {
          mainContent.innerHTML = `
            <p class="error">You need to login first.</p>
          `;
          return;
        }

        try {
          const response = await fetch(
            `https://watch-list-backend.vercel.app/api/media/${mediaId}`,
            {
              method: "GET",
              headers: {
                Authorization: `Bearer ${token}`,
              },
            },
          );

          const result = await response.json();

          if (!response.ok) {
            mainContent.innerHTML = `
              <p class="error">
                ${result.message || result.description || "Failed to load media."}
              </p>
            `;
            return;
          }

          const media = result.data;

          mainContent.innerHTML = `
            <section class="media-details">
              <img
                class="poster"
                src="${media.poster}"
                alt="${media.title} poster"
                onerror="this.src='https://placehold.co/300x450?text=No+Poster'"
              />

              <div class="info">
                <h1>${media.title}</h1>

                <p class="meta">
                  ${media.type} • ${media.releaseYear}
                </p>

                <div class="genres">
                  ${renderGenres(media.genres)}
                </div>

                <p class="summary">
                  ${media.summary || "No summary available."}
                </p>

                <p class="rating">
                  Rating: ${media.rating !== undefined && media.rating !== null ? `${media.rating}/10` : "No rating"}
                </p>

                <button class="add-button" type="button">
                  Add to Watchlist
                </button>

                <p class="disabled-note">
                  This button is only visual for now. It is not connected to the backend yet.
                </p>
              </div>
            </section>
          `;
        } catch (error) {
          mainContent.innerHTML = `
            <p class="error">
              Could not connect to the backend. Make sure your server is running on http://127.0.0.1:3000.
            </p>
          `;
        }
      }

      loadMediaDetails();
    </script>
  </body>
</html>
