<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Watchlist</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
        background: #1f2937;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .login-container h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 28px;
      }

      .login-container p {
        text-align: center;
        color: #9ca3af;
        margin-bottom: 28px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #d1d5db;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #374151;
        border-radius: 10px;
        background: #111827;
        color: #ffffff;
        font-size: 15px;
        outline: none;
      }

      input:focus {
        border-color: #6366f1;
      }

      input::placeholder {
        color: #6b7280;
      }

      .login-button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #6366f1;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }

      .login-button:hover {
        background: #4f46e5;
      }

      .register-link {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
        color: #9ca3af;
      }

      .register-link a {
        color: #818cf8;
        text-decoration: none;
        font-weight: bold;
      }

      .register-link a:hover {
        text-decoration: underline;
      }

      .error-message {
        display: none;
        margin-bottom: 16px;
        padding: 10px;
        border-radius: 8px;
        background: #7f1d1d;
        color: #fecaca;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <main class="login-container">
      <h1>Welcome Back</h1>
      <p>Log in to your watchlist account</p>

      <div id="errorMessage" class="error-message">
        Invalid email or password.
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="login-button">Login</button>
      </form>

      <div class="register-link">
        Don't have an account?
        <a href="register.html">Create one</a>
      </div>
    </main>

    <script>
      const loginForm = document.getElementById("loginForm");
      const errorMessage = document.getElementById("errorMessage");

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("https://watch-list-backend-xi.vercel.app/api/users/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              password,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            errorMessage.style.display = "block";
            errorMessage.textContent = data.message || "Login failed.";
            return;
          }

          localStorage.setItem("token", data.data.token);
          localStorage.setItem("user", JSON.stringify(data.data));

          window.location.href = "index.html";
        } catch (error) {
          errorMessage.style.display = "block";
          errorMessage.textContent = "Something went wrong. Try again.";
        }
      });
    </script>
  </body>
</html>
