<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Watchlist</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
      }

      .register-container {
        width: 100%;
        max-width: 420px;
        background: #1f2937;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .register-container h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 28px;
      }

      .register-container p {
        text-align: center;
        color: #9ca3af;
        margin-bottom: 28px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #d1d5db;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #374151;
        border-radius: 10px;
        background: #111827;
        color: #ffffff;
        font-size: 15px;
        outline: none;
      }

      input:focus {
        border-color: #6366f1;
      }

      input::placeholder {
        color: #6b7280;
      }

      .register-button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #6366f1;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }

      .register-button:hover {
        background: #4f46e5;
      }

      .login-link {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
        color: #9ca3af;
      }

      .login-link a {
        color: #818cf8;
        text-decoration: none;
        font-weight: bold;
      }

      .login-link a:hover {
        text-decoration: underline;
      }

      .message {
        display: none;
        margin-bottom: 16px;
        padding: 10px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
      }

      .error-message {
        background: #7f1d1d;
        color: #fecaca;
      }

      .success-message {
        background: #064e3b;
        color: #bbf7d0;
      }
    </style>
  </head>

  <body>
    <main class="register-container">
      <h1>Create Account</h1>
      <p>Start building your watchlist</p>

      <div id="messageBox" class="message"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Choose a username"
            minlength="2"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            minlength="6"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat your password"
            minlength="6"
            required
          />
        </div>

        <button type="submit" class="register-button">Create Account</button>
      </form>

      <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
      </div>
    </main>

    <script>
      const registerForm = document.getElementById("registerForm");
      const messageBox = document.getElementById("messageBox");

      function showMessage(message, type) {
        messageBox.textContent = message;
        messageBox.className = `message ${type}`;
        messageBox.style.display = "block";
      }

      registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
          showMessage("Passwords do not match.", "error-message");
          return;
        }

        try {
          const response = await fetch("https://watch-list-backend-xi.vercel.app/api/users/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username,
              email,
              password,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            showMessage(data.message || "Account creation failed.", "error-message");
            return;
          }

          showMessage("Account created successfully!", "success-message");

          if (data.data.token) {
            localStorage.setItem("token", data.data.token);
            localStorage.setItem("user", JSON.stringify(data.data));

            window.location.href = "index.html";
          } else {
            setTimeout(() => {
              window.location.href = "login.html";
            }, 1000);
          }
        } catch (error) {
          showMessage("Something went wrong. Try again.", "error-message");
        }
      });
    </script>
  </body>
</html>
